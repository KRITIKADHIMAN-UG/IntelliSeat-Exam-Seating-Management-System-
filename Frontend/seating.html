<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seating - Exam Seating System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <h1>Exam Seating Management</h1>
    <p>Seating</p>
  </header>

  <nav class="navbar">
    <a href="index.html">Home</a>
    <a href="students.html">Students</a>
    <a href="exams.html">Exams</a>
    <a href="seating.html" class="active">Seating</a>
    <a href="shifts.html">Shifts</a>
  </nav>

  <main class="container">
    <section class="card">
      <h2>Generate Seating</h2>
      <form id="seatingForm" class="form-grid">
        <input type="text" id="hallName" placeholder="Hall Name" required>
        <input type="number" id="hallCapacity" placeholder="Hall Capacity" min="1" required>
        <button type="submit" class="btn">Generate Plan</button>
      </form>
    </section>

    <section class="card">
      <h2>Seating Output</h2>
      <p id="seatingOutput">No seating plan generated yet.</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
